[project]
name = "pyqc"
version = "0.1.0"
description = "A tool for reviewing QC images and storing ratings"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyqt5>=5.15.0",
]

[project.scripts]
pyqc = "PyQC:main"

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff.lint.per-file-ignores]
# window1.py is auto-generated from window1.ui via pyuic5 and then patched
# by hand per AGENTS.md to swap in SaneDefaultsImageLabel. The star-import
# is part of that patch.
"window1.py" = ["F403", "F405"]
